name: Build and deploy

on:
  push:
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Verify Dockerfiles (no push)
        run: |
          docker build -f docker/Dockerfile.backend -t ci-backend .
          docker build -f docker/Dockerfile.frontend -t ci-frontend .
          docker build -f docker/Dockerfile.migrate -t ci-migrate .

  publish:
    needs: build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name prefix (lowercase)
        id: ns
        run: echo "prefix=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ steps.ns.outputs.prefix }}/backend:${{ github.sha }}
            ${{ steps.ns.outputs.prefix }}/backend:latest

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.ns.outputs.prefix }}/frontend:${{ github.sha }}
            ${{ steps.ns.outputs.prefix }}/frontend:latest

      - name: Push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrate
          push: true
          tags: |
            ${{ steps.ns.outputs.prefix }}/migrate:${{ github.sha }}
            ${{ steps.ns.outputs.prefix }}/migrate:latest

  deploy:
    needs: publish
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy — pull images, migrate, restart (no build on server)
        uses: appleboy/ssh-action@v1.2.0
        env:
          PREFIX: ghcr.io/${{ github.repository }}
          SHA: ${{ github.sha }}
          GHCR_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PREFIX,SHA,GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            PREFIX_LC=$(echo "$PREFIX" | tr '[:upper:]' '[:lower:]')
            export BACKEND_IMAGE="${PREFIX_LC}/backend:${SHA}"
            export FRONTEND_IMAGE="${PREFIX_LC}/frontend:${SHA}"
            export MIGRATE_IMAGE="${PREFIX_LC}/migrate:${SHA}"
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            docker compose -f docker/docker-compose.prod.yml pull backend frontend migrate
            docker compose -f docker/docker-compose.prod.yml up -d postgres
            docker compose -f docker/docker-compose.prod.yml run --rm migrate
            docker compose -f docker/docker-compose.prod.yml up -d backend frontend
