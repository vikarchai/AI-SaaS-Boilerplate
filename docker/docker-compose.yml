# Local development: PostgreSQL only. Run the app with `npm run dev` on the host.
services:
  postgres:
    image: postgres:16-alpine
    container_name: boilerplate-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
